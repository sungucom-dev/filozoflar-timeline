<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filozoflar Zaman Tüneli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ee;
  --bg2: #ede9e0;
  --surface: #ffffff;
  --surface2: #f2efe7;
  --border: #d6cfc0;
  --border2: #c4bbab;
  --gold: #8b6914;
  --gold-light: #c9a84c;
  --gold-pale: rgba(139,105,20,0.08);
  --text: #1a1612;
  --text2: #4a4035;
  --text3: #7a6f60;
  --text4: #b0a494;
  --accent: #2c5282;
  --red: #8b2e2e;
  --green: #2e6b3e;
  --shadow: rgba(80,60,20,0.12);
  --timeline-h: 400px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 2rem 2rem 1.5rem;
  text-align: center;
  box-shadow: 0 2px 12px var(--shadow);
}
.header-ornament {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.5em;
  color: var(--text4);
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}
h1 span { color: var(--gold); }
.subtitle {
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem;
  color: var(--text3);
  margin-top: 0.4rem;
  letter-spacing: 0.05em;
}

/* ── CONTROLS BAR ── */
.controls-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.8rem;
}
.hint {
  font-size: 0.75rem;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 1rem;
}
.hint span { display: flex; align-items: center; gap: 0.3rem; }
.hint svg { width: 14px; height: 14px; opacity: 0.6; }
.zoom-info {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--text3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0.3rem 0.8rem;
}

/* ── ERA FILTERS ── */
.era-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.7rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  overflow-x: auto;
}
.era-label {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
  flex-shrink: 0;
  margin-right: 0.3rem;
}
.era-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Lato', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 0.25rem 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  border-radius: 2px;
}
.era-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-pale);
}
.era-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
}

/* ── TIMELINE ── */
.timeline-outer {
  position: relative;
  width: 100%;
  overflow: hidden;
  cursor: grab;
  user-select: none;
  background: var(--bg);
}
.timeline-outer:active { cursor: grabbing; }

/* Fade edges */
.fade-l, .fade-r {
  position: absolute;
  top: 0; height: 100%; width: 60px;
  pointer-events: none; z-index: 20;
}
.fade-l { left: 0; background: linear-gradient(90deg, var(--bg) 0%, transparent 100%); }
.fade-r { right: 0; background: linear-gradient(-90deg, var(--bg) 0%, transparent 100%); }

.timeline-canvas {
  position: relative;
  height: var(--timeline-h);
  min-width: 100%;
  will-change: transform;
}

/* Axis */
.axis-line {
  position: absolute;
  left: 0; right: 0;
  top: calc(var(--timeline-h)/2);
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--border2) 3%, var(--border2) 97%, transparent 100%);
  pointer-events: none;
  z-index: 2;
}

/* ── TICK ── */
.tick {
  position: absolute;
  top: 0;
  height: var(--timeline-h);
  pointer-events: none;
  z-index: 1;
}
.tick-line {
  position: absolute;
  left: 0;
  top: calc(50% - 8px);
  width: 1px;
  height: 16px;
  background: var(--border2);
}
.tick-label {
  position: absolute;
  left: 0;
  top: calc(50% + 12px);
  font-family: 'Lato', sans-serif;
  font-size: 0.55rem;
  color: var(--text3);
  letter-spacing: 0.05em;
  transform: translateX(-50%);
  white-space: nowrap;
}

/* ── NODE ── */
.node {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}
.node:hover .dot-outer { transform: scale(1.5); }
.node.active .dot-outer { transform: scale(1.8); }

.dot-outer {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
  position: relative;
  z-index: 11;
}
.dot-outer.imp3 { width: 14px; height: 14px; }
.dot-inner {
  width: 60%; height: 60%;
  border-radius: 50%;
  background: #fff;
  opacity: 0.7;
}

.node-label-wrap {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  white-space: nowrap;
}
.node-label-wrap.above { bottom: calc(100% + 4px); }
.node-label-wrap.below { top: calc(100% + 4px); }

.node-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  line-height: 1.2;
  background: rgba(247,244,238,0.92);
  padding: 1px 3px;
}
.node.active .node-name { color: var(--gold); }
.node:hover .node-name { color: var(--accent); }

.node-year-lbl {
  font-family: 'Lato', sans-serif;
  font-size: 0.56rem;
  color: var(--text3);
  white-space: nowrap;
  background: rgba(247,244,238,0.85);
  padding: 0 3px;
}

/* ── SCROLL BAR ── */
.scrollbar-wrap {
  padding: 4px 2rem 2px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.scrollbar-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  position: relative;
  cursor: pointer;
}
.scrollbar-thumb {
  height: 100%;
  background: var(--gold-light);
  border-radius: 2px;
  position: absolute;
  top: 0; left: 0;
  min-width: 24px;
  cursor: grab;
}

/* ── PANEL ── */
.panel-wrap {
  max-width: 900px;
  margin: 1.5rem auto 3rem;
  padding: 0 1.5rem;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border2);
  box-shadow: 0 4px 24px var(--shadow);
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  max-height: 0;
  transition: opacity 0.4s ease, transform 0.4s ease, max-height 0.5s ease;
  position: relative;
}
.panel.open {
  opacity: 1;
  transform: translateY(0);
  max-height: 3000px;
}

.panel-top {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem 1.2rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}
.panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}
.panel-subtitle {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--text3);
  margin-top: 0.3rem;
}
.panel-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.5rem;
  flex-shrink: 0;
}
.panel-era-tag {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--surface);
  padding: 0.3rem 0.7rem;
  text-transform: uppercase;
}
.wiki-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: transparent;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  font-family: 'Lato', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 0.35rem 0.9rem;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  border-radius: 2px;
}
.wiki-btn:hover {
  background: var(--accent);
  color: #fff;
}
.wiki-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

.panel-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: transparent;
  border: none;
  font-size: 1.3rem;
  color: var(--text3);
  cursor: pointer;
  transition: color 0.2s;
  line-height: 1;
  z-index: 5;
}
.panel-close:hover { color: var(--red); }

.panel-body {
  padding: 1.8rem 2rem;
  font-family: 'Lato', sans-serif;
  font-size: 1rem;
  line-height: 1.9;
  color: var(--text);
}
.panel-body p { margin-bottom: 1rem; }
.panel-body h3 {
  font-family: 'Cinzel', serif;
  font-size: 0.78rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin: 1.8rem 0 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}
.panel-body ul, .panel-body ol {
  padding-left: 1.5rem;
  margin-bottom: 1rem;
}
.panel-body li { margin-bottom: 0.45rem; }
.panel-body strong { color: var(--text); font-weight: 700; }
.panel-body em { color: var(--text2); }
.panel-body blockquote {
  border-left: 3px solid var(--gold-light);
  padding: 0.6rem 1.2rem;
  margin: 1rem 0;
  background: var(--gold-pale);
  font-style: italic;
  color: var(--text2);
}

.sw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-top: 1.5rem;
}
@media(max-width: 600px) { .sw-grid { grid-template-columns: 1fr; } }

.sw-box {
  border: 1px solid var(--border);
  padding: 1.2rem;
  background: var(--bg);
}
.sw-box h4 {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.sw-box.strength h4 { color: var(--green); border-color: rgba(46,107,62,0.3); }
.sw-box.weakness h4 { color: var(--red); border-color: rgba(139,46,46,0.3); }

.content-loading {
  text-align:center;
  padding: 2rem;
  color: var(--text3);
  font-style: italic;
  font-size: 0.95rem;
  letter-spacing: 0.05em;
}
.content-loading::after {
  content: '';
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-left: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.no-content {
  text-align: center;
  padding: 2.5rem;
  color: var(--text3);
  font-style: italic;
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
}

/* Legendary / mythical node special style */
.node.legendary .dot-outer {
  border: 2px dashed currentColor !important;
  background: transparent !important;
}
.node.legendary .dot-inner {
  background: currentColor;
  opacity: 0.8;
}
.node.legendary .node-name {
  font-style: italic;
  opacity: 0.85;
}

/* ── Year-group hover: CSS-only fan, zero flicker ── */
/* Non-solo groups: fan nodes to fanned position on wrapper hover */
.yr-group:not(.solo):hover .yr-node {
  transform: translate(-50%, calc(-50% + var(--fy))) !important;
}
.yr-group:not(.solo):hover .yr-node .connector-line {
  height: var(--fh) !important;
}
.yr-group:not(.solo):hover .yr-node .node-label-wrap {
  opacity: 1 !important;
}
/* Ensure wrapper itself doesn't block axis text */
.yr-group { background: transparent; }

/* Era color dots on timeline */
.era-indicator {
  position: absolute;
  bottom: 8px;
  left: 0; right: 0;
  height: 3px;
  pointer-events: none;
  z-index: 1;
}
</style>

// ═══════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════
const MIN_YEAR = -1200;
const MAX_YEAR = 2000;
const BASE_PX = 0.22; // px per year at zoom=1

let zoom = 1;
let offset = 0; // translateX applied to canvas
let activeId = null;
let activeEra = null;
let isDrag = false, dragX0 = 0, offset0 = 0;
let isThumbDrag = false, thumbX0 = 0, thumbOff0 = 0;

const tlOuter = document.getElementById('tlOuter');
const tlCanvas = document.getElementById('tlCanvas');
const sbThumb = document.getElementById('sbThumb');
const sbTrack = document.getElementById('sbTrack');
const zoomInfo = document.getElementById('zoomInfo');

function yearToX(y) { return (y - MIN_YEAR) * BASE_PX * zoom; }
function totalWidth() { return (MAX_YEAR - MIN_YEAR) * BASE_PX * zoom + 300; }

function clamp() {
  const tw = totalWidth();
  const ow = tlOuter.offsetWidth;
  const maxOff = 80;
  const minOff = ow - tw - 80;
  offset = Math.min(maxOff, Math.max(minOff, offset));
}

function applyOffset() {
  tlCanvas.style.transform = `translateX(${offset}px)`;
  updateScrollbar();
}

function updateScrollbar() {
  const tw = totalWidth();
  const ow = tlOuter.offsetWidth;
  const ratio = ow / tw;
  const thumbW = Math.max(20, ow * ratio);
  const maxScroll = tw - ow;
  const scrollPos = Math.max(0, -offset);
  const frac = maxScroll > 0 ? scrollPos / maxScroll : 0;
  const thumbLeft = frac * (ow - thumbW);
  sbThumb.style.width = thumbW + 'px';
  sbThumb.style.left = Math.max(0, thumbLeft) + 'px';
}

function render() {
  tlCanvas.innerHTML = '';
  const list = activeEra ? PHILOSOPHERS.filter(p => p.era === activeEra) : PHILOSOPHERS;
  const tw = totalWidth();
  tlCanvas.style.width = tw + 'px';

  // Year ticks — pick interval so ticks are 50–200px apart
  const targetGap = 80;
  const yearsPerPx = 1 / (BASE_PX * zoom);
  const rawInterval = targetGap * yearsPerPx;
  const niceIntervals = [1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000];
  let interval = niceIntervals.find(n => n >= rawInterval) || 50000;

  const startY = Math.ceil(MIN_YEAR / interval) * interval;
  for (let y = startY; y <= MAX_YEAR; y += interval) {
    const x = yearToX(y);
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.left = x + 'px';
    const tl = document.createElement('div'); tl.className = 'tick-line';
    const lb = document.createElement('div'); lb.className = 'tick-label';
    if (y < 0) lb.textContent = `M.Ö. ${Math.abs(y).toLocaleString()}`;
    else if (y === 0) lb.textContent = '0';
    else lb.textContent = `M.S. ${y.toLocaleString()}`;
    tick.appendChild(tl); tick.appendChild(lb);
    tlCanvas.appendChild(tick);
  }

  // ── STACKING + FAN-ON-HOVER ──
  // DOT_STEP_C: collapsed — dots barely clear each other (no labels shown in multi-groups)
  // DOT_STEP_F: fanned   — full label height + padding so labels never overlap
  const DOT_STEP_C = 20;   // px between dot centres when collapsed
  const DOT_STEP_F = 58;   // px between dot centres when fanned (label ~30px + gaps)

  // Group by year, sort imp3 first
  const yearGroups = {};
  list.forEach(p => {
    if (!yearGroups[p.year]) yearGroups[p.year] = [];
    yearGroups[p.year].push(p);
  });
  Object.values(yearGroups).forEach(g => g.sort((a,b) => b.imp - a.imp));

  // Assign alternating slots: 0, +1, -1, +2, -2 ...
  const slotOf = {};
  Object.entries(yearGroups).forEach(([yr, grp]) => {
    grp.forEach((p, i) => {
      slotOf[p.id] = i === 0 ? 0 : (i % 2 === 1 ? Math.ceil(i/2) : -Math.floor(i/2));
    });
  });

  // Render — group wrapper handles hover via CSS, zero JS events = zero flicker
  Object.entries(yearGroups).forEach(([yr, grp]) => {
    const baseX  = yearToX(Number(yr));
    const n      = grp.length;
    const isSolo = n === 1;

    // One wrapper per year group positioned on the axis
    const wrapper = document.createElement('div');
    wrapper.className = 'yr-group' + (isSolo ? ' solo' : '');
    wrapper.dataset.year = yr;

    // Height: enough to contain fully fanned nodes + labels (both sides)
    const maxSlot = grp.reduce((m,p) => Math.max(m, Math.abs(slotOf[p.id])), 0);
    const fanH    = maxSlot * DOT_STEP_F + 60; // half-height each side + label room
    wrapper.style.cssText = [
      `position:absolute`,
      `left:${baseX}px`,
      `top:50%`,
      `transform:translate(-50%,-50%)`,
      `width:120px`,           // wide enough to catch label hover
      `height:${fanH * 2}px`, // symmetric around axis
      `z-index:9`,
      `cursor:pointer`,
      isSolo ? `pointer-events:none` : '',
    ].filter(Boolean).join(';');

    grp.forEach((p) => {
      const slot    = slotOf[p.id];
      const isAbove = slot >= 0;
      const color   = ERA_COLORS[p.era] || '#555';
      const isActive = p.id === activeId;
      const isLeg  = p.era === 'Efsanevi';

      // node positioned relative to wrapper centre = axis
      const node = document.createElement('div');
      node.className = 'node yr-node' + (isActive ? ' active' : '') + (isLeg ? ' legendary' : '');
      node.dataset.pid  = p.id;
      node.dataset.slot = slot;
      // CSS vars for collapsed/fanned positions — actual transition done in CSS
      node.style.cssText = [
        `position:absolute`,
        `left:50%`,
        `top:50%`,
        // collapsed: slot * DOT_STEP_C from centre
        `--cy:${-slot * DOT_STEP_C}px`,
        `--fy:${-slot * DOT_STEP_F}px`,
        `transform:translate(-50%, calc(-50% + var(--cy)))`,
        `transition:transform 0.22s cubic-bezier(.4,0,.2,1)`,
        `z-index:${10 + Math.abs(slot)}`,
      ].join(';');

      // Connector line
      if (slot !== 0) {
        const ln = document.createElement('div');
        ln.className = 'connector-line';
        // height transitions via CSS too
        ln.style.cssText = [
          `position:absolute`,
          `left:50%`,
          slot > 0 ? `top:50%` : `bottom:50%`,
          `transform:translateX(-50%)`,
          `width:1px`,
          `--ch:${Math.abs(slot) * DOT_STEP_C}px`,
          `--fh:${Math.abs(slot) * DOT_STEP_F}px`,
          `height:var(--ch)`,
          `background:${color}44`,
          `pointer-events:none`,
          `z-index:1`,
          `transition:height 0.22s cubic-bezier(.4,0,.2,1)`,
        ].join(';');
        node.appendChild(ln);
      }

      // Dot
      const dotO = document.createElement('div');
      dotO.className = 'dot-outer' + (p.imp === 3 ? ' imp3' : '');
      dotO.style.cssText = [
        `background:${isLeg ? 'transparent' : color}`,
        isLeg ? `border:2px dashed ${color}` : '',
        `box-shadow:${isActive
          ? `0 0 0 3px ${color}50,0 0 0 6px ${color}20`
          : `0 0 0 2px ${color}40`}`,
        `position:relative`,
        `z-index:5`,
      ].filter(Boolean).join(';');
      const dotI = document.createElement('div');
      dotI.className = 'dot-inner';
      if (isLeg) dotI.style.background = color;
      dotO.appendChild(dotI);
      node.appendChild(dotO);

      // Label
      const lw = document.createElement('div');
      lw.className = 'node-label-wrap ' + (isAbove ? 'above' : 'below');
      lw.style.cssText = [
        `pointer-events:none`,
        `transition:opacity 0.18s`,
        (isSolo || isActive) ? `opacity:1` : `opacity:0`,
      ].join(';');
      const nm = document.createElement('div');
      nm.className = 'node-name';
      if (isActive) nm.style.color = color;
      nm.textContent = p.name;
      const yl = document.createElement('div');
      yl.className = 'node-year-lbl';
      yl.textContent = p.displayYear;
      lw.appendChild(nm);
      lw.appendChild(yl);
      const DOT_PX = p.imp === 3 ? 9 : 7;
      if (isAbove) lw.style.bottom = `calc(50% + ${DOT_PX + 5}px)`;
      else         lw.style.top    = `calc(50% + ${DOT_PX + 5}px)`;
      node.appendChild(lw);

      node.addEventListener('click', e => { e.stopPropagation(); selectNode(p.id); });
      wrapper.appendChild(node);
    });

    // Click on wrapper background (not a node) — no-op but stop propagation
    wrapper.addEventListener('click', e => e.stopPropagation());
    tlCanvas.appendChild(wrapper);
  });
  applyOffset();
}

// ═══════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════
tlOuter.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = tlOuter.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const worldX = (mx - offset) / zoom;
  const factor = e.deltaY < 0 ? 1.15 : (1/1.15);
  zoom = Math.max(0.05, zoom * factor); // no max zoom!
  offset = mx - worldX * zoom;
  clamp();
  applyOffset();
  render();
  zoomInfo.textContent = `Yakınlaştırma: ${Math.round(zoom * 100)}%`;
}, {passive:false});

// Drag
tlOuter.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  isDrag = true; dragX0 = e.clientX; offset0 = offset;
  tlOuter.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
  if (isDrag) {
    offset = offset0 + (e.clientX - dragX0);
    clamp(); applyOffset();
  }
  if (isThumbDrag) {
    const tw = totalWidth(), ow = tlOuter.offsetWidth;
    const thumbW = Math.max(20, ow * ow / tw);
    const maxThumbLeft = ow - thumbW;
    const ratio = tw / ow;
    offset = thumbOff0 - (e.clientX - thumbX0) * ratio;
    clamp(); applyOffset();
  }
});
document.addEventListener('mouseup', () => {
  isDrag = false; isThumbDrag = false;
  tlOuter.style.cursor = 'grab';
});

// Touch
tlOuter.addEventListener('touchstart', e => {
  isDrag = true; dragX0 = e.touches[0].clientX; offset0 = offset;
},{passive:true});
document.addEventListener('touchmove', e => {
  if (!isDrag) return;
  offset = offset0 + (e.touches[0].clientX - dragX0);
  clamp(); applyOffset();
},{passive:true});
document.addEventListener('touchend', () => isDrag = false);

// Scrollbar drag
sbThumb.addEventListener('mousedown', e => {
  e.stopPropagation();
  isThumbDrag = true; thumbX0 = e.clientX; thumbOff0 = offset;
});
sbTrack.addEventListener('click', e => {
  const rect = sbTrack.getBoundingClientRect();
  const tw = totalWidth(), ow = tlOuter.offsetWidth;
  const frac = (e.clientX - rect.left) / rect.width;
  const maxScroll = tw - ow;
  offset = -(frac * maxScroll);
  clamp(); applyOffset();
});

// ═══════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════
function selectNode(id) {
  activeId = id;
  render();
  // Make the active node's label always visible even in collapsed group
  const activeNode = tlCanvas.querySelector(`.node[data-pid="${id}"]`);
  if (activeNode) {
    const lbl = activeNode.querySelector('.node-label-wrap');
    if (lbl) lbl.style.opacity = '1';
  }
  showPanel(id);
}

// JSON içerik verisini HTML'ye dönüştürür
function renderContent(d) {
  let h = '';

  if (d.intro) {
    h += `<p>${d.intro}</p>`;
  }

  (d.sections || []).forEach(sec => {
    h += `<h3>${sec.title}</h3>`;
    if (sec.body) h += `<p>${sec.body}</p>`;
    if (sec.items && sec.items.length) {
      const tag = sec.ordered ? 'ol' : 'ul';
      h += `<${tag}>`;
      sec.items.forEach(item => {
        if (item.label) {
          h += `<li><strong>${item.label}:</strong> ${item.text}</li>`;
        } else {
          h += `<li>${item.text}</li>`;
        }
      });
      h += `</${tag}>`;
    }
  });

  const hasStrengths = d.strengths && d.strengths.length;
  const hasWeaknesses = d.weaknesses && d.weaknesses.length;

  if (hasStrengths || hasWeaknesses) {
    h += `<div class="sw-grid">`;
    if (hasStrengths) {
      h += `<div class="sw-box strength"><h4>✦ Güçlü Yönler</h4><ol>`;
      d.strengths.forEach(s => {
        h += `<li><strong>${s.title}:</strong> ${s.text}</li>`;
      });
      h += `</ol></div>`;
    }
    if (hasWeaknesses) {
      h += `<div class="sw-box weakness"><h4>✦ Zayıf Noktalar</h4><ol>`;
      d.weaknesses.forEach(w => {
        h += `<li><strong>${w.title}:</strong> ${w.text}</li>`;
      });
      h += `</ol></div>`;
    }
    h += `</div>`;
  }

  return h || '<div class="no-content"><p>İçerik yapılandırılamamadı.</p></div>';
}

function showPanel(id) {
  const p = PHILOSOPHERS.find(x => x.id === id);
  if (!p) return;
  const color = ERA_COLORS[p.era] || '#555';
  const wikiUrl = WIKI_URLS[id];
  const panel = document.getElementById('detailPanel');
  const pc = document.getElementById('panelContent');

  let html = `<div class="panel-top">
    <div>
      <div class="panel-title">${p.name}</div>
      ${p.subtitle ? `<div class="panel-subtitle">${p.subtitle}</div>` : ''}
      <div class="panel-subtitle" style="color:var(--text3)">${p.displayYear}</div>
    </div>
    <div class="panel-meta">
      <div class="panel-era-tag" style="background:${color}">${p.era}</div>
      ${wikiUrl ? `
      <a class="wiki-btn" href="${wikiUrl}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Türkçe Vikipedi
      </a>` : ''}
    </div>
  </div>
  <div class="panel-body">`;

  // Header kısmını hemen göster
  html += '<div class="panel-body"><div class="content-loading">Yükleniyor…</div></div>';
  pc.innerHTML = html;
  panel.classList.add('open');
  setTimeout(() => panel.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);

  // İçeriği fetch et
  fetch(`content/${id}.json`)
    .then(r => { if (!r.ok) throw new Error('no-content'); return r.json(); })
    .then(data => {
      const body = pc.querySelector('.panel-body');
      body.innerHTML = renderContent(data);
    })
    .catch(() => {
      const body = pc.querySelector('.panel-body');
      body.innerHTML = `<div class="no-content">
        <p>Bu filozof için içerik henüz eklenmemiş.</p>
        <p style="font-size:0.85rem;margin-top:0.5rem;font-family:Lato,sans-serif;font-style:normal;color:var(--text3)">
          <code>content/${id}.json</code> dosyasını oluşturarak içerik ekleyebilirsiniz.
        </p>
      </div>`;
    });
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  activeId = null;
  render();
}

// ═══════════════════════════════════════════
// ERA FILTERS + AUTO ZOOM
// ═══════════════════════════════════════════
function buildEraFilters() {
  const eras = [...new Set(PHILOSOPHERS.map(p => p.era))];
  const container = document.getElementById('eraFilters');

  const allBtn = document.createElement('button');
  allBtn.className = 'era-btn active';
  allBtn.textContent = 'Tümü';
  allBtn.onclick = () => {
    activeEra = null;
    document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    // Reset to full view
    zoom = 1;
    const ow = tlOuter.offsetWidth;
    offset = -(yearToX(-400) - ow * 0.45);
    clamp(); render();
    zoomInfo.textContent = `Yakınlaştırma: 100%`;
  };
  container.appendChild(allBtn);

  eras.forEach(era => {
    const btn = document.createElement('button');
    btn.className = 'era-btn';
    btn.textContent = era;
    const color = ERA_COLORS[era] || '#555';
    btn.style.borderColor = color + '60';
    btn.onmouseenter = () => { if (!btn.classList.contains('active')) btn.style.borderColor = color; btn.style.color = color; btn.style.background = color + '12'; };
    btn.onmouseleave = () => { if (!btn.classList.contains('active')) { btn.style.borderColor = color + '60'; btn.style.color = ''; btn.style.background = ''; } };
    btn.onclick = () => {
      activeEra = era;
      document.querySelectorAll('.era-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = ''; b.style.color = ''; b.style.borderColor = ERA_COLORS[b.textContent] ? ERA_COLORS[b.textContent] + '60' : '';
      });
      btn.classList.add('active');
      btn.style.background = color; btn.style.color = '#fff'; btn.style.borderColor = color;
      autoZoomToEra(era);
    };
    container.appendChild(btn);
  });
}

function autoZoomToEra(era) {
  const list = PHILOSOPHERS.filter(p => p.era === era);
  if (!list.length) return;
  const minY = Math.min(...list.map(p => p.year));
  const maxY = Math.max(...list.map(p => p.year));
  const spanYears = Math.max(maxY - minY, 50);
  const ow = tlOuter.offsetWidth;
  const padding = 120;
  // Fit span into view with padding
  zoom = (ow - padding * 2) / (spanYears * BASE_PX);
  zoom = Math.max(0.05, Math.min(50, zoom));
  const midX = yearToX((minY + maxY) / 2);
  offset = ow / 2 - midX;
  clamp();
  render();
  zoomInfo.textContent = `Yakınlaştırma: ${Math.round(zoom * 100)}%`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildEraFilters();

// Start: show M.Ö. 1100 to M.S. 500 roughly (full early history visible)
zoom = 1;
const ow = tlOuter.offsetWidth || 900;
// Center around M.Ö. ~400 so Hermes visible on left and Rome visible on right
offset = -(yearToX(-400) - ow * 0.45);
clamp();
render();
</script>
